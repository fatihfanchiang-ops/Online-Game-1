<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LTBrown Community - Online Store & Delivery</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            background: #2c3e50;
            color: white;
            padding: 30px 0;
            text-align: center;
        }

        .cart-section {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            margin: 20px 0;
        }

        .total {
            font-size: 1.2rem;
            font-weight: bold;
            margin: 10px 0;
        }

        .checkout-btn {
            background: #27ae60;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1rem;
        }

        .products h2 {
            margin-bottom: 20px;
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
        }

        .product-card {
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 15px;
            text-align: center;
        }

        .product-img {
            width: 120px;
            height: 120px;
            object-fit: contain;
            margin: 0 auto 10px;
        }

        .product-card h3 {
            margin: 10px 0;
        }

        .product-card button {
            background: #3498db;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
        }

        .cart-items {
            margin: 10px 0;
        }

        .cart-item {
            padding: 8px;
            border-bottom: 1px solid #ddd;
        }

        .order-status {
            background: #f1f1f1;
            padding: 20px;
            border-radius: 8px;
            margin: 20px 0;
        }

        .delivery-tracker {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
        }

        .step {
            text-align: center;
            padding: 10px;
            background: white;
            border-radius: 5px;
            width: 23%;
        }

        .step.active {
            background: #27ae60;
            color: white;
        }
    </style>
</head>
<body>

    <header class="header">
        <div class="container">
            <h1><i class="fas fa-store"></i> LTBrown Community Store</h1>
            <p>Fast Delivery for Our Community</p>
        </div>
    </header>

    <section class="cart-section">
        <div class="container">
            <h2>Your Cart <span id="cart-count">0</span></h2>
            <div id="cart-items" class="cart-items"></div>
            <p class="total">Total: ¥<span id="total-price">0.00</span></p>
            <button id="checkout-btn" class="checkout-btn">Place Order & Request Delivery</button>
        </div>
    </section>

    <main class="products">
        <div class="container">
            <h2>Community Products</h2>
            <div class="product-grid" id="product-grid"></div>
        </div>
    </main>

    <section class="order-status" id="order-status" style="display: none;">
        <div class="container">
            <h2>Order & Delivery Status</h2>
            <div id="status-message"></div>
            <div class="delivery-tracker">
                <div class="step" id="step1"><i class="fas fa-check"></i> Order Placed</div>
                <div class="step" id="step2">Preparing</div>
                <div class="step" id="step3">Out for Delivery</div>
                <div class="step" id="step4">Delivered</div>
            </div>
        </div>
    </section>

    <script>
        // 只换了图片！价格、名字、功能 100% 保留你原来的
        const products = [
            {
                id: 1,
                name: "可乐",
                price: 100,
                image: "https://nimg.ws.126.net/?url=http%3A%2F%2Fdingyue.ws.126.net%2F2026%2F0430%2F39754390j00teb1870063d000u0018zm.jpg&thumbnail=660x2147483647&quality=80&type=jpg"
            },
            {
                id: 2,
                name: "橙子",
                price: 200,
                image: "https://img2.baidu.com/it/u=2390670,1882300917&fm=253&fmt=auto&app=138&f=JPEG?w=500&h=644"
            },
            {
                id: 3,
                name: "农夫山泉",
                price: 30,
                image: "https://img2.baidu.com/it/u=858356215,3685209921&fm=253&app=138&f=JPEG?w=800&h=1422"
            }
        ];

        let cart = [];
        let total = 0;

        function renderProducts() {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = '';

            products.forEach(product => {
                const card = document.createElement('div');
                card.className = 'product-card';
                card.innerHTML = `
                    <img src="${product.image}" class="product-img" alt="${product.name}">
                    <h3>${product.name}</h3>
                    <p>¥${product.price.toFixed(2)}</p>
                    <button onclick="addToCart(${product.id})">Add to Cart</button>
                `;
                grid.appendChild(card);
            });
        }

        function addToCart(id) {
            const product = products.find(p => p.id === id);
            cart.push(product);
            total += product.price;
            updateCart();
        }

        function updateCart() {
            const count = document.getElementById('cart-count');
            const items = document.getElementById('cart-items');
            const totalPrice = document.getElementById('total-price');

            count.textContent = cart.length;
            totalPrice.textContent = total.toFixed(2);

            items.innerHTML = '';
            cart.forEach(item => {
                const div = document.createElement('div');
                div.className = 'cart-item';
                div.textContent = `${item.name} - ¥${item.price.toFixed(2)}`;
                items.appendChild(div);
            });
        }

        document.getElementById('checkout-btn').addEventListener('click', () => {
            if (cart.length === 0) {
                alert("Your cart is empty!");
                return;
            }

            document.getElementById('order-status').style.display = 'block';
            document.getElementById('status-message').textContent = "Your order has been placed!";
            
            const steps = ['step1', 'step2', 'step3', 'step4'];
            steps.forEach((s, i) => {
                setTimeout(() => {
                    document.getElementById(s).classList.add('active');
                }, i * 1500);
            });
        });

        window.onload = renderProducts;
    </script>
</body>
</html>
